<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction History | Forest Fire Prediction System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <main class="page">
      <nav class="top-nav">
        <div class="brand">Forest Fire Prediction System</div>
        <div class="nav-links">
          <a href="/" data-nav="home">Home</a>
          <a href="/history-page" data-nav="history">History</a>
          <a href="/saved" data-nav="saved">Saved Locations</a>
        </div>
      </nav>

      <section class="hero">
        <h1>Prediction History</h1>
        <p>Track previous predictions and review model/rule outputs over time.</p>
      </section>

      <section class="panel" style="margin-top: 18px;">
        <div class="panel-header">Server History</div>
        <div class="panel-body table-wrap">
          <table>
            <thead>
              <tr>
                <th>Location</th>
                <th>Coordinates</th>
                <th>Score</th>
                <th>Category</th>
                <th>Model Used</th>
                <th>Timestamp</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel" style="margin-top: 18px;">
        <div class="panel-header">Local Device History (Quick Cache)</div>
        <div class="panel-body">
          <ol id="localHistoryList"></ol>
        </div>
      </section>
    </main>

    <div id="toast" class="toast"></div>

    <script type="module" src="/assets/js/history.js"></script>
  </body>
</html>
