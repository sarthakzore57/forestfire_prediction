<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Locations | Forest Fire Prediction System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <main class="page">
      <nav class="top-nav">
        <div class="brand">Forest Fire Prediction System</div>
        <div class="nav-links">
          <a href="/" data-nav="home">Home</a>
          <a href="/history-page" data-nav="history">History</a>
          <a href="/saved" data-nav="saved">Saved Locations</a>
        </div>
      </nav>

      <section class="hero">
        <h1>Saved Locations Monitoring</h1>
        <p>
          Pin critical areas and auto-refresh risk values every few minutes. Browser notifications are triggered on high risk or major changes.
        </p>
      </section>

      <section class="panel" style="margin-top: 18px;">
        <div class="panel-header">Add Location Manually</div>
        <div class="panel-body">
          <form id="manualPinForm" class="search-row pin-form">
            <input class="field" type="text" name="location_name" placeholder="Location name" required />
            <input class="field" type="number" step="any" name="latitude" placeholder="Latitude" required />
            <input class="field" type="number" step="any" name="longitude" placeholder="Longitude" required />
            <input class="field" type="text" name="country_code" placeholder="Country" maxlength="3" />
            <input class="field" type="text" name="notes" placeholder="Notes (optional)" />
            <button class="btn btn-primary" type="submit">Pin</button>
          </form>
        </div>
      </section>

      <section style="margin-top: 18px; display:flex; justify-content: flex-end;">
        <button id="refreshAllBtn" class="btn btn-secondary" type="button">Refresh All Now</button>
      </section>

      <section id="savedGrid" class="saved-grid" style="margin-top: 14px;"></section>
    </main>

    <div id="toast" class="toast"></div>

    <script type="module" src="/assets/js/saved.js"></script>
  </body>
</html>
